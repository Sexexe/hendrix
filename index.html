<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>SAMPLER HENDRIX 5.0</title>
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
<script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom) 12px; overflow-x: hidden; user-select: none; -webkit-user-select: none; }
.container { max-width: 650px; margin: 0 auto; }
.header { position: relative; text-align: center; padding: 16px 0; font-size: 20px; font-weight: 600; color: #fff; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid #333; margin-bottom: 16px; }
.header-title { display: block; text-align: center; }
.lang-switch { position: absolute; top: 50%; left: 0; transform: translateY(-50%); background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 6px; padding: 6px 10px; color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
.lang-switch:hover { background: #3a3a3a; border-color: #4a4a4a; }
.lang-switch:active { transform: translateY(-50%) scale(0.95); }
.about-btn { position: absolute; top: 50%; right: 0; transform: translateY(-50%); background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 6px; padding: 8px 12px; color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
.about-btn:hover { background: #3a3a3a; border-color: #4a4a4a; }
.about-btn:active { transform: translateY(-50%) scale(0.95); }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; animation: fadeIn 0.3s ease; }
.modal-overlay.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; max-width: 700px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; animation: slideUp 0.3s ease; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
.modal-header { padding: 20px; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.modal-title { font-size: 18px; font-weight: 600; color: #fff; }
.modal-controls { display: flex; gap: 8px; align-items: center; }
.close-btn { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 6px; width: 32px; height: 32px; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.close-btn:hover { background: #dc2626; border-color: #ef4444; }
.modal-content { padding: 20px; overflow-y: auto; flex: 1; line-height: 1.6; color: #ccc; font-size: 14px; }
.modal-content::-webkit-scrollbar { width: 8px; }
.modal-content::-webkit-scrollbar-track { background: #0f0f0f; }
.modal-content::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
.modal-content h1 { font-size: 22px; color: #fff; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #333; }
.modal-content h2 { font-size: 18px; color: #fff; margin-top: 24px; margin-bottom: 12px; }
.modal-content h3 { font-size: 16px; color: #fff; margin-top: 16px; margin-bottom: 8px; }
.modal-content p { margin-bottom: 12px; }
.modal-content ul { margin-left: 20px; margin-bottom: 12px; }
.modal-content li { margin-bottom: 6px; }
.modal-content strong { color: #fff; font-weight: 600; }
.modal-content code { background: #0f0f0f; padding: 2px 6px; border-radius: 3px; font-family: 'Courier New', monospace; font-size: 13px; color: #4ade80; }
.modal-content .highlight { background: rgba(74, 222, 128, 0.1); padding: 12px; border-left: 3px solid #4ade80; border-radius: 6px; margin: 12px 0; }
.modal-content table { width: 100%; border-collapse: collapse; margin: 12px 0; }
.modal-content th, .modal-content td { padding: 8px; text-align: left; border: 1px solid #333; font-size: 13px; }
.modal-content th { background: #0f0f0f; color: #fff; font-weight: 600; }
.panel { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
canvas { width: 100%; height: 160px; background: #0a0a0a; border: 1px solid #333; border-radius: 6px; cursor: crosshair; display: block; touch-action: none; }
.pads { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.pad { aspect-ratio: 1; background: #2a2a2a; border: 2px solid #3a3a3a; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.1s; position: relative; min-height: 0; padding: 4px; }
.pad:active { transform: scale(0.95); }
.pad.active { border-color: #fff; background: #3a3a3a; }
.pad.loaded { background: #1a2f1a; border-color: #2d5a2d; }
.pad.loaded.active { border-color: #fff; background: #2d4a2d; }
.pad.selected { border-color: #d97706; background: #3a2f1a; }
.pad.playing { animation: padPulse 0.6s infinite; }
@keyframes padPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); } 50% { box-shadow: 0 0 0 6px rgba(255,255,255,0.15); } }
.pad-num { font-size: 20px; font-weight: 600; color: #666; line-height: 1; }
.pad.loaded .pad-num { color: #fff; }
.pad-duration { font-size: 10px; color: #888; margin-top: 4px; line-height: 1; }
.pad.loaded .pad-duration { color: #aaa; }
.transport { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
.transport button { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 6px; padding: 16px 12px; color: #fff; font-size: 20px; cursor: pointer; transition: all 0.1s; min-height: 60px; display: flex; align-items: center; justify-content: center; font-weight: 600; }
.transport button:active { transform: scale(0.95); background: #3a3a3a; }
.transport button:disabled { opacity: 0.3; cursor: not-allowed; }
.transport button.rec { background: #7f1d1d; border-color: #991b1b; }
.transport button.rec.active { background: #dc2626; border-color: #ef4444; animation: recPulse 1s infinite; }
@keyframes recPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } }
.transport button.play { background: #14532d; border-color: #166534; }
.transport button.loop { background: #713f12; border-color: #854d0e; font-size: 13px; letter-spacing: 0.5px; }
.transport button.loop.active { background: #ca8a04; border-color: #eab308; color: #000; }
.transport button.stop { background: #450a0a; border-color: #7f1d1d; }
.actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.actions button, .actions label { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 6px; padding: 12px 10px; color: #fff; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.1s; min-height: 48px; display: flex; align-items: center; justify-content: center; text-align: center; }
.actions button:active, .actions label:active { transform: scale(0.95); background: #3a3a3a; }
.actions button:disabled { opacity: 0.3; cursor: not-allowed; }
.actions button.merge { background: #713f12; border-color: #854d0e; }
.actions button.rec-mix { background: #7f1d1d; border-color: #991b1b; }
.actions button.rec-mix.active { background: #dc2626; animation: recPulse 1s infinite; }
input[type=file] { display: none; }
.status { text-align: center; color: #888; font-size: 12px; margin-top: 12px; min-height: 18px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.effects { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.effect { background: #141414; border-radius: 6px; padding: 12px; border: 1px solid #2a2a2a; }
.effect-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.effect-value { color: #fff; font-size: 13px; font-weight: 600; }
.effect input[type=range] { width: 100%; height: 5px; border-radius: 3px; background: #333; outline: none; -webkit-appearance: none; appearance: none; cursor: pointer; }
.effect input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; cursor: pointer; border: 2px solid #000; }
.effect input[type=range]::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: #fff; cursor: pointer; border: 2px solid #000; }
.toggle { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 11px; color: #888; }
.toggle input { width: 16px; height: 16px; cursor: pointer; accent-color: #fff; }
.selection-info { text-align: center; color: #666; font-size: 11px; margin-top: 8px; min-height: 16px; }
.mode-indicator { text-align: center; color: #d97706; font-size: 11px; margin-bottom: 8px; min-height: 16px; font-weight: 600; }
.rec-indicator { display: none; align-items: center; justify-content: center; gap: 10px; padding: 10px; background: rgba(220, 38, 38, 0.1); border: 1px solid #7f1d1d; border-radius: 6px; margin-top: 10px; font-size: 12px; color: #f87171; font-weight: 600; }
.rec-indicator.active { display: flex; }
.rec-dot { width: 10px; height: 10px; border-radius: 50%; background: #dc2626; animation: recDotPulse 1s infinite; }
@keyframes recDotPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.rec-level { flex: 1; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
.rec-level-bar { height: 100%; background: linear-gradient(90deg, #22c55e, #eab308, #ef4444); width: 0%; transition: width 0.05s; }
.slot-indicator { text-align: center; color: #fff; font-size: 13px; font-weight: 600; margin-bottom: 10px; padding: 8px; background: #2a2a2a; border-radius: 6px; border: 1px solid #3a3a3a; }
@media (max-width: 500px) { .pad-num { font-size: 16px; } .pad-duration { font-size: 9px; } .header { font-size: 16px; } .pads { gap: 6px; } .modal { max-height: 90vh; } .modal-content { padding: 16px; font-size: 13px; } .modal-content h1 { font-size: 20px; } .modal-content h2 { font-size: 16px; } .modal-content h3 { font-size: 14px; } }
@media (max-width: 400px) { 
  .transport button { padding: 14px 10px; font-size: 18px; } 
  .transport button.loop { font-size: 12px; }
  .actions button, .actions label { font-size: 11px; padding: 10px 8px; } 
  .effect { padding: 10px; }
  .pad-num { font-size: 14px; }
  .pad-duration { font-size: 8px; }
  .pads { gap: 4px; }
  .header { font-size: 14px; }
  .lang-switch { padding: 5px 8px; font-size: 10px; }
  .about-btn { padding: 4px 6px; font-size: 9px; transform: translateY(-50%) scale(0.5); transform-origin: right center; }
  .about-btn:active { transform: translateY(-50%) scale(0.475); transform-origin: right center; }
}
@media (max-width: 340px) { 
  .pad-num { font-size: 12px; } .pad-duration { font-size: 7px; margin-top: 2px; } .pads { gap: 3px; } .pad { border-width: 1px; border-radius: 4px; }
  .header { font-size: 12px; letter-spacing: 0.5px; }
  .lang-switch { padding: 4px 6px; font-size: 9px; }
  .about-btn { padding: 3px 5px; font-size: 8px; transform: translateY(-50%) scale(0.5); transform-origin: right center; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <button class="lang-switch" id="langSwitch" onclick="toggleLanguage()">RU</button>
    <span class="header-title">SAMPLER HENDRIX 5.0</span>
    <button class="about-btn" id="aboutBtn" onclick="openAbout()">О ПРОГРАММЕ</button>
  </div>
  
  <div class="modal-overlay" id="aboutModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">О программе SAMPLER HENDRIX 5.0</div>
        <div class="modal-controls"><button class="close-btn" onclick="closeAbout()">×</button></div>
      </div>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <div class="panel">
    <canvas id="wave"></canvas>
    <div class="selection-info" id="selInfo">Нажмите и тяните для выделения</div>
  </div>
  <div class="panel">
    <div class="mode-indicator" id="modeIndicator"></div>
    <div class="pads" id="pads"></div>
  </div>
  <div class="panel">
    <div class="transport">
      <button id="recBtn" class="rec">●</button>
      <button id="playBtn" class="play" disabled>▶</button>
      <button id="loopBtn" class="loop" disabled>ПЕТЛЯ</button>
      <button id="stopBtn" class="stop" disabled>■</button>
    </div>
    <div class="rec-indicator" id="recIndicator">
      <div class="rec-dot"></div>
      <span id="recTime">0:00</span>
      <div class="rec-level"><div class="rec-level-bar" id="recLevel"></div></div>
    </div>
    <div class="actions">
      <label for="fileInput" id="loadBtn">📂 Загрузить</label>
      <input type="file" id="fileInput" accept="audio/*">
      <button id="trimBtn" disabled>✂ Обрезать</button>
      <button id="resetBtn" disabled>↺ Сброс</button>
      <button id="exportBtn" disabled>💾 Сохранить</button>
      <button id="recMixBtn" class="rec-mix">⏺ Запись</button>
      <button id="mergeBtn" class="merge" disabled>🔗 Слияние</button>
      <button id="clearBtn" disabled>🗑 Очистить</button>
      <button id="selectModeBtn">✓ Выбрать</button>
    </div>
    <div class="status" id="status">Загрузите аудио или запишите</div>
  </div>
  <div class="panel">
    <div class="slot-indicator" id="slotIndicator">Слот 1</div>
    <div class="effects">
      <div class="effect"><div class="effect-label"><span id="tempoLabel">Темп</span><span class="effect-value" id="tempoVal">1.00x</span></div><input type="range" id="tempo" min="0.25" max="2" step="0.01" value="1"></div>
      <div class="effect"><div class="effect-label"><span id="pitchLabel">Высота</span><span class="effect-value" id="pitchVal">0 ct</span></div><input type="range" id="pitch" min="-1200" max="1200" step="1" value="0"></div>
      <div class="effect"><div class="effect-label"><span id="volLabel">Громкость</span><span class="effect-value" id="volVal">100%</span></div><input type="range" id="vol" min="0" max="1" step="0.01" value="1"></div>
      <div class="effect"><div class="effect-label"><span id="panLabel">Панорама</span><span class="effect-value" id="panVal">Ц</span></div><input type="range" id="pan" min="-1" max="1" step="0.01" value="0"></div>
      <div class="effect"><div class="effect-label"><span id="filtLabel">Фильтр</span><span class="effect-value" id="filtVal">Выкл</span></div><input type="range" id="filt" min="100" max="16000" step="100" value="1000"><div class="toggle"><input type="checkbox" id="filtOn"><label for="filtOn" id="filtOnLabel">ФНЧ</label></div></div>
      <div class="effect"><div class="effect-label"><span id="distLabel">Дисторшн</span><span class="effect-value" id="distVal">0</span></div><input type="range" id="dist" min="0" max="100" step="1" value="0"></div>
      <div class="effect"><div class="effect-label"><span id="delLabel">Дилей</span><span class="effect-value" id="delVal">0 мс</span></div><input type="range" id="del" min="0" max="1000" step="10" value="0"></div>
      <div class="effect"><div class="effect-label"><span id="revLabel">Реверб</span><span class="effect-value" id="revVal">0%</span></div><input type="range" id="rev" min="0" max="1" step="0.01" value="0"></div>
      <div class="effect"><div class="effect-label"><span id="tremLabel">Тремоло</span><span class="effect-value" id="tremVal">0%</span></div><input type="range" id="trem" min="0" max="1" step="0.01" value="0"></div>
      <div class="effect"><div class="effect-label"><span id="bitLabel">Биткраш</span><span class="effect-value" id="bitVal">0</span></div><input type="range" id="bit" min="0" max="16" step="1" value="0"></div>
    </div>
  </div>
</div>

let vkBridgeReady = false;

async function initVKBridge() {
  try {
    if (window.vkBridge) {
      await vkBridge.send('VKWebAppInit');
      vkBridgeReady = true;
      console.log('✅ VK Bridge initialized');
      try {
        await vkBridge.send('VKWebAppSetViewSettings', { 
          status_bar_style: 'light', 
          action_bar_color: '#1a1a1a' 
        });
      } catch(e) {}
    }
  } catch (e) {
    console.log('VK Bridge not available');
  }
}

function vkHaptic(type = 'light') { 
  if (!vkBridgeReady) return; 
  try { vkBridge.send('VKWebAppTapticImpactOccurred', { style: type }); } catch(e) {} 
}

function vkNotify() { 
  if (!vkBridgeReady) return; 
  try { vkBridge.send('VKWebAppTapticNotificationOccurred', { type: 'success' }); } catch(e) {} 
}

const $ = id => document.getElementById(id);
const canvas = $('wave'), ctx = canvas.getContext('2d');

let audioCtx;
let slots = Array(10).fill(null);
let activeSlot = 0;
let selection = null, isDragging = false, dragStart = 0;
let selectMode = false;
let selectedSlots = new Set();
let currentSourceId = 0;
let isLooping = false;

let slotSettings = Array(10).fill(null).map(() => ({
  tempo: 1, pitch: 0, vol: 1, pan: 0, filt: 1000, filtOn: false, dist: 0, del: 0, rev: 0, trem: 0, bit: 0
}));

let isRecording = false, recStream = null, recMediaRecorder = null;
let recChunks = [], recStartTime = 0, recTimerInterval = null;
let isRecordingMix = false, mixRecorder = null, mixStreamDest = null, mixChunks = [], mixStartTime = 0, mixTimerInterval = null;
const activeChains = new Map();
let rafId = null;

function init() {
  try {
    window.addEventListener('click', function firstClick() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100, latencyHint: 'interactive' }); } catch (e) { console.error('AudioContext error:', e); }
      }
      window.removeEventListener('click', firstClick);
    }, { once: false });
    initPads();
    loadSlotSettings(0);
    updateTransportButtons();
    applyTranslations();
  } catch (err) { console.error('Init error:', err); setStatus(translations[currentLang].initError + err.message); }
}

function ensureCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100, latencyHint: 'interactive' });
  return audioCtx;
}

function loadSlotSettings(slotIndex) {
  const s = slotSettings[slotIndex];
  $('tempo').value = s.tempo; $('pitch').value = s.pitch; $('vol').value = s.vol; $('pan').value = s.pan;
  $('filt').value = s.filt; $('filtOn').checked = s.filtOn; $('dist').value = s.dist; $('del').value = s.del;
  $('rev').value = s.rev; $('trem').value = s.trem; $('bit').value = s.bit;
  updateLabelsUI();
  $('slotIndicator').textContent = translations[currentLang].slotIndicator + ' ' + (slotIndex + 1);
}

function saveCurrentSettings() {
  slotSettings[activeSlot] = {
    tempo: parseFloat($('tempo').value), pitch: parseInt($('pitch').value), vol: parseFloat($('vol').value), pan: parseFloat($('pan').value),
    filt: parseFloat($('filt').value), filtOn: $('filtOn').checked, dist: parseInt($('dist').value), del: parseFloat($('del').value),
    rev: parseFloat($('rev').value), trem: parseFloat($('trem').value), bit: parseInt($('bit').value)
  };
}

function initPads() {
  const c = $('pads'); c.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'pad'; p.dataset.index = i;
    p.innerHTML = `<div class="pad-num">${i + 1}</div><div class="pad-duration"></div>`;
    p.addEventListener('click', () => handlePadClick(i));
    c.appendChild(p);
  }
  updatePads();
}

function handlePadClick(i) {
  vkHaptic('light');
  if (selectMode) {
    if (selectedSlots.has(i)) selectedSlots.delete(i); else selectedSlots.add(i);
    updatePads(); updateMergeButton();
  } else {
    saveCurrentSettings();
    activeSlot = i; selection = null;
    loadSlotSettings(i);
    updatePads(); drawWave(); updateTransportButtons();
    $('selInfo').textContent = slots[i] ? translations[currentLang].selInfo : translations[currentLang].emptySlot;
  }
}

function updatePads() {
  document.querySelectorAll('.pad').forEach((p, i) => {
    p.classList.remove('active', 'loaded', 'selected', 'playing');
    if (slots[i]) { p.classList.add('loaded'); p.querySelector('.pad-duration').textContent = slots[i].duration.toFixed(1) + 'с'; }
    else p.querySelector('.pad-duration').textContent = '';
    if (i === activeSlot) p.classList.add('active');
    if (selectedSlots.has(i)) p.classList.add('selected');
    if (activeChains.has(i)) p.classList.add('playing');
  });
}

function updateTransportButtons() {
  const h = slots[activeSlot] !== null;
  ['playBtn','loopBtn','stopBtn','trimBtn','resetBtn','exportBtn','clearBtn'].forEach(id => $(id).disabled = !h);
}

function updateMergeButton() { $('mergeBtn').disabled = selectedSlots.size < 2; }

function resizeCanvas() {
  const r = canvas.getBoundingClientRect();
  if (r.width > 0 && r.height > 0) { canvas.width = r.width; canvas.height = r.height; drawWave(); }
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
setTimeout(resizeCanvas, 100);

$('fileInput').onchange = async e => {
  const f = e.target.files[0]; if (!f) return;
  ensureCtx(); setStatus(translations[currentLang].loading);
  const arr = await f.arrayBuffer();
  try {
    slots[activeSlot] = await audioCtx.decodeAudioData(arr);
    selection = null; drawWave(); updatePads(); updateTransportButtons();
    setStatus(translations[currentLang].loadedToSlot + ' ' + (activeSlot + 1));
    vkNotify();
  } catch (err) { setStatus(translations[currentLang].error + err.message); }
};

$('recBtn').addEventListener('click', async function(e) {
  vkHaptic('medium');
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { setStatus(translations[currentLang].micNotSupported); return; }
    if (isRecording) { stopRecording(); return; }
    ensureCtx();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    setStatus(translations[currentLang].micRequest);
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } }).catch(() => navigator.mediaDevices.getUserMedia({ audio: true }));
    recStream = stream; recChunks = [];
    recMediaRecorder = new MediaRecorder(stream);
    recMediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) recChunks.push(e.data); };
    recMediaRecorder.onerror = (e) => { setStatus(translations[currentLang].error); stopRecording(); };
    recMediaRecorder.onstop = async () => {
      if (recStream) { recStream.getTracks().forEach(t => t.stop()); recStream = null; }
      if (recChunks.length === 0) { setStatus(translations[currentLang].noAudio); resetRecordingUI(); return; }
      setStatus(translations[currentLang].processing);
      try {
        const blob = new Blob(recChunks, { type: recMediaRecorder.mimeType });
        const arr = await blob.arrayBuffer();
        const buffer = await audioCtx.decodeAudioData(arr);
        slots[activeSlot] = buffer; selection = null;
        drawWave(); updatePads(); updateTransportButtons();
        setStatus(translations[currentLang].recorded + ' ' + buffer.duration.toFixed(1) + 'с');
        vkNotify();
      } catch (err) { setStatus(translations[currentLang].error + err.message); }
      resetRecordingUI();
    };
    recMediaRecorder.start();
    isRecording = true; recStartTime = Date.now();
    $('recBtn').classList.add('active'); $('recBtn').textContent = '■';
    $('recIndicator').classList.add('active'); setStatus(translations[currentLang].recording);
    recTimerInterval = setInterval(updateRecTimer, 100);
  } catch (err) {
    if (err.name === 'NotAllowedError') setStatus(translations[currentLang].accessDenied);
    else setStatus(translations[currentLang].error + err.message);
    if (recStream) { recStream.getTracks().forEach(t => t.stop()); recStream = null; }
    resetRecordingUI();
  }
});

function stopRecording() {
  if (!isRecording) return;
  vkHaptic('light');
  if (recTimerInterval) { clearInterval(recTimerInterval); recTimerInterval = null; }
  if (recMediaRecorder && recMediaRecorder.state !== 'inactive') { try { recMediaRecorder.stop(); } catch(e) {} }
}

function resetRecordingUI() {
  isRecording = false;
  $('recBtn').classList.remove('active'); $('recBtn').textContent = '●';
  $('recIndicator').classList.remove('active');
  $('recTime').textContent = '0:00'; $('recLevel').style.width = '0%';
  recChunks = []; recMediaRecorder = null;
}

function updateRecTimer() {
  const e = Math.floor((Date.now() - recStartTime) / 1000);
  $('recTime').textContent = Math.floor(e/60) + ':' + (e%60).toString().padStart(2,'0');
}

$('recMixBtn').onclick = async () => {
  vkHaptic('medium');
  ensureCtx(); await audioCtx.resume();
  if (!isRecordingMix) await startRecordingMix(); else await stopRecordingMix();
};

async function startRecordingMix() {
  try {
    mixStreamDest = audioCtx.createMediaStreamDestination();
    mixChunks = [];
    activeChains.forEach(d => d.chain.outputGain.connect(mixStreamDest));
    const mt = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
    mixRecorder = new MediaRecorder(mixStreamDest.stream, { mimeType: mt });
    mixRecorder.ondataavailable = e => { if (e.data.size > 0) mixChunks.push(e.data); };
    mixRecorder.start(100);
    isRecordingMix = true; mixStartTime = Date.now();
    $('recMixBtn').classList.add('active'); $('recMixBtn').textContent = translations[currentLang].stopBtn;
    setStatus(translations[currentLang].recordingMix);
    mixTimerInterval = setInterval(() => {
      const e = Math.floor((Date.now() - mixStartTime) / 1000);
      setStatus(translations[currentLang].recordingMixTime + ' ' + Math.floor(e/60) + ':' + (e%60).toString().padStart(2,'0'));
    }, 100);
  } catch (err) { setStatus(translations[currentLang].error + err.message); }
}

async function stopRecordingMix() {
  if (!isRecordingMix) return;
  if (mixTimerInterval) { clearInterval(mixTimerInterval); mixTimerInterval = null; }
  activeChains.forEach(d => { try { d.chain.outputGain.disconnect(mixStreamDest); } catch(e){} });
  mixRecorder.stop();
  mixRecorder.onstop = async () => {
    if (mixChunks.length === 0) { setStatus(translations[currentLang].noAudio); resetMixRecordingUI(); return; }
    setStatus(translations[currentLang].converting);
    try {
      const blob = new Blob(mixChunks, { type: 'audio/webm' });
      const arr = await blob.arrayBuffer();
      const ab = await audioCtx.decodeAudioData(arr);
      const mp3 = await convertToMP3(ab);
      const url = URL.createObjectURL(mp3);
      const a = document.createElement('a'); a.href = url; a.download = 'smplrbot.mp3'; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      setStatus(translations[currentLang].mixSaved);
      vkNotify();
    } catch (err) { setStatus(translations[currentLang].error + err.message); }
    resetMixRecordingUI();
  };
}

function resetMixRecordingUI() {
  isRecordingMix = false;
  $('recMixBtn').classList.remove('active'); $('recMixBtn').textContent = translations[currentLang].recBtn;
  mixChunks = []; mixStreamDest = null; mixRecorder = null;
}

async function convertToMP3(ab) {
  const sr = ab.sampleRate, nc = ab.numberOfChannels, len = ab.length;
  const enc = new lamejs.Mp3Encoder(nc, sr, 128);
  const chs = []; for (let c = 0; c < nc; c++) chs.push(ab.getChannelData(c));
  const left = f32ToI16(chs[0]);
  const right = nc > 1 ? f32ToI16(chs[1]) : left;
  const data = []; const bs = 1152;
  for (let i = 0; i < len; i += bs) {
    const b = enc.encodeBuffer(left.subarray(i, i + bs), right.subarray(i, i + bs));
    if (b.length > 0) data.push(b);
  }
  const end = enc.flush(); if (end.length > 0) data.push(end);
  return new Blob(data, { type: 'audio/mp3' });
}

function f32ToI16(f) {
  const i = new Int16Array(f.length);
  for (let x = 0; x < f.length; x++) { const s = Math.max(-1, Math.min(1, f[x])); i[x] = s < 0 ? s * 0x8000 : s * 0x7FFF; }
  return i;
}

function makeBitcrushCurve(bits) {
  if (bits <= 0) return null;
  const n = 44100;
  const curve = new Float32Array(n);
  const steps = Math.pow(2, bits - 1);
  for (let i = 0; i < n; i++) { const x = i * 2 / n - 1; curve[i] = Math.round(x * steps) / steps; }
  return curve;
}

function createChain(ac, buffer, opts, slotIdx) {
  const source = ac.createBufferSource();
  source.buffer = buffer; source.loop = opts.loop;
  source.playbackRate.value = opts.playbackRate; source.detune.value = opts.detune;
  if (opts.loop) { source.loopStart = opts.loopStart; source.loopEnd = opts.loopEnd; }
  const filter = ac.createBiquadFilter();
  filter.type = 'lowpass'; filter.frequency.value = opts.filtOn ? opts.filt : 20000; filter.Q.value = 1;
  const shaper = ac.createWaveShaper();
  shaper.curve = makeDistortionCurve(opts.dist); shaper.oversample = '4x';
  const bitcrusher = ac.createWaveShaper();
  if (opts.bit > 0) { bitcrusher.curve = makeBitcrushCurve(opts.bit); bitcrusher.oversample = 'none'; }
  else { const neutral = new Float32Array(44100); for (let i = 0; i < 44100; i++) neutral[i] = i * 2 / 44100 - 1; bitcrusher.curve = neutral; }
  const delay = ac.createDelay(2); delay.delayTime.value = Math.max(0.001, opts.del / 1000);
  const delayFb = ac.createGain(); delayFb.gain.value = 0.4;
  const delayWet = ac.createGain(); delayWet.gain.value = opts.del > 0 ? 0.5 : 0;
  const convolver = ac.createConvolver(); convolver.buffer = makeImpulse(ac, 2, 2);
  const revWet = ac.createGain(); revWet.gain.value = opts.rev;
  const revDry = ac.createGain(); revDry.gain.value = 1 - opts.rev * 0.5;
  const tremoloGain = ac.createGain(); tremoloGain.gain.value = 1;
  const tremoloLfo = ac.createOscillator(); tremoloLfo.frequency.value = 6; tremoloLfo.type = 'sine';
  const tremoloDepth = ac.createGain(); tremoloDepth.gain.value = opts.trem * 0.5;
  tremoloLfo.connect(tremoloDepth); tremoloDepth.connect(tremoloGain.gain); tremoloLfo.start();
  const panner = ac.createStereoPanner(); panner.pan.value = opts.pan;
  const outputGain = ac.createGain(); outputGain.gain.value = opts.vol;
  source.connect(filter); filter.connect(shaper); shaper.connect(bitcrusher);
  bitcrusher.connect(delay); delay.connect(delayFb); delayFb.connect(delay); delay.connect(delayWet);
  const afterDelay = ac.createGain(); bitcrusher.connect(afterDelay); delayWet.connect(afterDelay);
  afterDelay.connect(convolver); convolver.connect(revWet); afterDelay.connect(revDry);
  const afterRev = ac.createGain(); revWet.connect(afterRev); revDry.connect(afterRev);
  afterRev.connect(tremoloGain); tremoloGain.connect(panner); panner.connect(outputGain);
  outputGain.connect(ac.destination);
  if (isRecordingMix && mixStreamDest) outputGain.connect(mixStreamDest);
  const now = ac.currentTime;
  if (opts.loop) { if (opts.offset > 0) source.start(now, opts.offset); else source.start(now); }
  else if (opts.offset > 0 || opts.duration) { source.start(now, opts.offset, opts.duration); }
  else { source.start(now); }
  return { source, filter, shaper, bitcrusher, delay, delayFb, delayWet, convolver, revWet, revDry, tremoloGain, tremoloLfo, tremoloDepth, panner, outputGain, slotIndex: slotIdx, startTime: now, offset: opts.offset || 0, bufferDuration: buffer.duration, playbackRate: opts.playbackRate, loop: opts.loop, loopStart: opts.loopStart || 0, loopEnd: opts.loopEnd || buffer.duration };
}

function updateAllChains() {
  activeChains.forEach((data, slotIdx) => {
    const c = data.chain; const s = slotSettings[slotIdx];
    c.source.playbackRate.value = s.tempo; c.source.detune.value = s.pitch; c.playbackRate = s.tempo;
    c.filter.frequency.value = s.filtOn ? s.filt : 20000;
    c.shaper.curve = makeDistortionCurve(s.dist);
    c.bitcrusher.curve = s.bit > 0 ? makeBitcrushCurve(s.bit) : null;
    c.delay.delayTime.value = Math.max(0.001, s.del / 1000); c.delayWet.gain.value = s.del > 0 ? 0.5 : 0;
    c.revWet.gain.value = s.rev; c.revDry.gain.value = 1 - s.rev * 0.5;
    c.tremoloDepth.gain.value = s.trem * 0.5; c.panner.pan.value = s.pan; c.outputGain.gain.value = s.vol;
  });
}

function play(loop) {
  const buffer = slots[activeSlot]; if (!buffer) return;
  vkHaptic('light');
  stopSlot(activeSlot);
  const myId = ++currentSourceId;
  const settings = slotSettings[activeSlot];
  const opts = { loop, playbackRate: settings.tempo, detune: settings.pitch, vol: settings.vol, pan: settings.pan, filtOn: settings.filtOn, filt: settings.filt, dist: settings.dist, del: settings.del, rev: settings.rev, trem: settings.trem, bit: settings.bit, offset: 0, duration: buffer.duration, loopStart: 0, loopEnd: buffer.duration };
  if (selection && selection.end - selection.start > 2) {
    const dur = buffer.duration; const offSec = selection.start / canvas.width * dur; const lenSec = (selection.end - selection.start) / canvas.width * dur;
    if (loop) { opts.offset = offSec; opts.loopStart = offSec; opts.loopEnd = offSec + lenSec; }
    else { opts.offset = offSec; opts.duration = Math.min(lenSec, dur - offSec); }
  }
  const chain = createChain(audioCtx, buffer, opts, activeSlot);
  activeChains.set(activeSlot, { chain, id: myId }); updatePads(); startRenderLoop();
  chain.source.onended = () => {
    const data = activeChains.get(activeSlot);
    if (data && data.id === myId) {
      try { chain.tremoloLfo.stop(); } catch(e){}
      activeChains.delete(activeSlot); updatePads();
      if (activeChains.size === 0) { stopRenderLoop(); if (isLooping) { isLooping = false; $('loopBtn').classList.remove('active'); } }
    }
  };
}

function stopSlot(slotIndex) {
  const data = activeChains.get(slotIndex);
  if (data) { try { data.chain.source.stop(); } catch(e){} try { data.chain.tremoloLfo.stop(); } catch(e){} activeChains.delete(slotIndex); }
  updatePads(); if (activeChains.size === 0) stopRenderLoop();
}

function stopAll() {
  vkHaptic('medium');
  activeChains.forEach(d => { try { d.chain.source.stop(); } catch(e){} try { d.chain.tremoloLfo.stop(); } catch(e){} });
  activeChains.clear(); updatePads(); stopRenderLoop(); isLooping = false; $('loopBtn').classList.remove('active');
}

$('playBtn').onclick = () => { if (isLooping) { isLooping = false; $('loopBtn').classList.remove('active'); } play(false); };
$('loopBtn').onclick = () => { vkHaptic('light'); if (isLooping) { isLooping = false; $('loopBtn').classList.remove('active'); stopSlot(activeSlot); } else { isLooping = true; $('loopBtn').classList.add('active'); play(true); } };
$('stopBtn').onclick = stopAll;

function getCurrentPosition(chain) {
  if (!audioCtx) return 0;
  const elapsed = audioCtx.currentTime - chain.startTime;
  let pos = chain.offset + elapsed * chain.playbackRate;
  const dur = chain.bufferDuration;
  if (chain.loop) { const ll = chain.loopEnd - chain.loopStart; if (ll > 0 && pos >= chain.loopEnd) pos = chain.loopStart + ((pos - chain.loopStart) % ll); }
  else { if (pos > dur) pos = dur; }
  return Math.max(0, Math.min(dur, pos));
}

function drawPlayhead() {
  if (canvas.width === 0 || canvas.height === 0) return;
  const H = canvas.height;
  activeChains.forEach((d, si) => {
    const pos = getCurrentPosition(d.chain); const x = (pos / d.chain.bufferDuration) * canvas.width;
    if (si === activeSlot) { ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 2; } else { ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; }
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  });
}

function renderLoop() { drawWave(); if (activeChains.size > 0) rafId = requestAnimationFrame(renderLoop); else rafId = null; }
function startRenderLoop() { if (!rafId) rafId = requestAnimationFrame(renderLoop); }
function stopRenderLoop() { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } drawWave(); }

function drawWave() {
  const W = canvas.width, H = canvas.height; if (W === 0 || H === 0) return;
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  const buffer = slots[activeSlot]; if (!buffer) return;
  const data = buffer.getChannelData(0); const step = Math.ceil(data.length / W); const amp = H / 2;
  if (selection && selection.end - selection.start > 1) {
    ctx.fillStyle = 'rgba(0, 255, 0, 0.3)';
    ctx.fillRect(selection.start, 0, selection.end - selection.start, H);
    ctx.strokeStyle = '#00ff00';
    ctx.lineWidth = 2;
    ctx.strokeRect(selection.start, 0, selection.end - selection.start, H);
  }
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.beginPath();
  for (let i = 0; i < W; i++) {
    let min = 1, max = -1;
    for (let j = 0; j < step; j++) { const v = data[i * step + j] || 0; if (v < min) min = v; if (v > max) max = v; }
    if (i === 0) ctx.moveTo(i, (1 + min) * amp);
    ctx.lineTo(i, (1 + min) * amp); ctx.lineTo(i, (1 + max) * amp);
  }
  ctx.stroke(); drawPlayhead();
}

function getPos(e) { const r = canvas.getBoundingClientRect(); const cx = e.touches ? e.touches[0].clientX : e.clientX; return (cx - r.left) * (canvas.width / r.width); }

canvas.addEventListener('mousedown', startDrag); canvas.addEventListener('touchstart', startDrag, { passive: false });
function startDrag(e) { if (!slots[activeSlot]) return; e.preventDefault(); isDragging = true; dragStart = getPos(e); selection = { start: dragStart, end: dragStart }; }
canvas.addEventListener('mousemove', moveDrag); canvas.addEventListener('touchmove', moveDrag, { passive: false });
function moveDrag(e) {
  if (!isDragging) return; e.preventDefault();
  const x = Math.max(0, Math.min(canvas.width, getPos(e)));
  selection.start = Math.min(dragStart, x); selection.end = Math.max(dragStart, x); drawWave();
  const b = slots[activeSlot]; if (b) { const d = b.duration; $('selInfo').textContent = (selection.start / canvas.width * d).toFixed(2) + 'с — ' + (selection.end / canvas.width * d).toFixed(2) + 'с'; }
}
canvas.addEventListener('mouseup', endDrag); canvas.addEventListener('mouseleave', endDrag); canvas.addEventListener('touchend', endDrag); canvas.addEventListener('touchcancel', endDrag);
function endDrag() { isDragging = false; }

$('trimBtn').onclick = () => {
  vkHaptic('light');
  const b = slots[activeSlot]; if (!b) return;
  if (!selection || selection.end - selection.start < 2) { setStatus(translations[currentLang].selectToChop); return; }
  const s = Math.floor(selection.start / canvas.width * b.length); const e = Math.floor(selection.end / canvas.width * b.length);
  const nl = Math.max(1, e - s); if (nl <= 0) { setStatus(translations[currentLang].invalidSelection); return; }
  const nb = audioCtx.createBuffer(b.numberOfChannels, nl, b.sampleRate);
  for (let c = 0; c < b.numberOfChannels; c++) { const src = b.getChannelData(c), dst = nb.getChannelData(c); for (let i = 0; i < nl; i++) dst[i] = src[s + i] || 0; }
  slots[activeSlot] = nb; selection = null; drawWave(); updatePads(); setStatus(translations[currentLang].chopped);
  vkNotify();
};

$('resetBtn').onclick = () => { vkHaptic('light'); stopSlot(activeSlot); slots[activeSlot] = null; selection = null; drawWave(); updatePads(); updateTransportButtons(); setStatus(translations[currentLang].slotCleared); };
$('clearBtn').onclick = () => { vkHaptic('light'); stopSlot(activeSlot); slots[activeSlot] = null; selection = null; drawWave(); updatePads(); updateTransportButtons(); setStatus(translations[currentLang].slotClearedNum + ' ' + (activeSlot + 1) + ' ' + translations[currentLang].cleared); };

$('selectModeBtn').onclick = () => {
  vkHaptic('light');
  selectMode = !selectMode;
  if (!selectMode) { selectedSlots.clear(); updateMergeButton(); }
  $('selectModeBtn').textContent = selectMode ? translations[currentLang].selectModeCancel : translations[currentLang].selectModeBtn;
  $('modeIndicator').textContent = selectMode ? translations[currentLang].modeSelect : '';
  updatePads();
};

$('mergeBtn').onclick = () => {
  vkHaptic('medium');
  if (selectedSlots.size < 2) return;
  const idx = Array.from(selectedSlots).sort((a, b) => a - b);
  const bufs = idx.map(i => slots[i]).filter(b => b !== null);
  if (bufs.length < 2) { setStatus(translations[currentLang].notEnoughSlots); return; }
  let ts = activeSlot; if (slots[ts] !== null) { ts = slots.findIndex(s => s === null); if (ts === -1) { setStatus(translations[currentLang].noFreeSlots); return; } }
  const sr = bufs[0].sampleRate, nc = bufs[0].numberOfChannels; const tl = bufs.reduce((s, b) => s + b.length, 0);
  const m = audioCtx.createBuffer(nc, tl, sr); let off = 0;
  for (const b of bufs) { for (let c = 0; c < nc; c++) { m.getChannelData(c).set(b.getChannelData(c), off); } off += b.length; }
  slots[ts] = m; activeSlot = ts; selection = null; selectMode = false; selectedSlots.clear();
  $('selectModeBtn').textContent = translations[currentLang].selectModeBtn; $('modeIndicator').textContent = '';
  drawWave(); updatePads(); updateTransportButtons(); updateMergeButton();
  setStatus(translations[currentLang].merged + ' ' + bufs.length + ' ' + translations[currentLang].samplesToSlot + ' ' + (ts + 1));
  vkNotify();
};

$('exportBtn').onclick = async () => {
  vkHaptic('medium');
  const validSlots = slots.filter(slot => slot !== null);
  if (validSlots.length === 0) { setStatus(translations[currentLang].noSlotsExport); return; }
  const sr = validSlots[0].sampleRate; const nc = validSlots[0].numberOfChannels;
  const totalLength = validSlots.reduce((sum, slot) => sum + slot.length, 0);
  const mergedBuffer = audioCtx.createBuffer(nc, totalLength, sr); let offset = 0;
  for (const slot of validSlots) { for (let c = 0; c < nc; c++) { mergedBuffer.getChannelData(c).set(slot.getChannelData(c), offset); } offset += slot.length; }
  setStatus(translations[currentLang].exporting);
  try {
    const oc = new OfflineAudioContext(nc, totalLength, sr);
    const source = oc.createBufferSource(); source.buffer = mergedBuffer; source.connect(oc.destination); source.start(0);
    const r = await oc.startRendering();
    const mp3 = await convertToMP3(r);
    const url = URL.createObjectURL(mp3);
    const a = document.createElement('a'); a.href = url; a.download = 'smplrbot.mp3'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    setStatus(translations[currentLang].saved);
    vkNotify();
  } catch (err) { setStatus(translations[currentLang].exportError + ' ' + err.message); }
};

function makeDistortionCurve(a) { const k = a, n = 44100, c = new Float32Array(n), d = Math.PI / 180; for (let i = 0; i < n; i++) { const x = i * 2 / n - 1; c[i] = (3 + k) * x * 20 * d / (Math.PI + k * Math.abs(x)); } return c; }
function makeImpulse(ac, dur, dec) { const r = ac.sampleRate, l = Math.max(1, Math.floor(r * dur)); const i = ac.createBuffer(2, l, r); for (let c = 0; c < 2; c++) { const ch = i.getChannelData(c); for (let x = 0; x < l; x++) ch[x] = (Math.random() * 2 - 1) * Math.pow(1 - x / l, dec); } return i; }

function updateLabelsUI() {
  const t = translations[currentLang];
  $('tempoVal').textContent = parseFloat($('tempo').value).toFixed(2) + 'x';
  $('pitchVal').textContent = $('pitch').value + ' ct';
  $('volVal').textContent = Math.round($('vol').value * 100) + t.percent;
  const p = parseFloat($('pan').value);
  if (Math.abs(p) < 0.02) $('panVal').textContent = t.panCenter; else if (p < 0) $('panVal').textContent = t.panLeft + Math.round(-p * 100); else $('panVal').textContent = t.panRight + Math.round(p * 100);
  $('revVal').textContent = Math.round($('rev').value * 100) + t.percent;
  $('delVal').textContent = $('del').value + ' ' + t.ms;
  $('distVal').textContent = $('dist').value;
  $('filtVal').textContent = $('filtOn').checked ? $('filt').value + ' Hz' : t.filtOff;
  $('tremVal').textContent = Math.round($('trem').value * 100) + t.percent;
  $('bitVal').textContent = $('bit').value > 0 ? $('bit').value + t.bit : '0';
}

function updateLabels() { updateLabelsUI(); saveCurrentSettings(); updateAllChains(); }
['tempo','pitch','vol','pan','rev','del','dist','filt','trem','bit'].forEach(id => $(id).addEventListener('input', updateLabels));
$('filtOn').addEventListener('change', updateLabels);
function setStatus(t) { $('status').textContent = t; }

init();
initVKBridge();
</script>
</body>
