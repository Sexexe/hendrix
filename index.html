<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>SAMPLER HENDRIX 5.0</title>
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
<script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f0f;color:#e0e0e0;min-height:100vh;padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom) 12px;overflow-x:hidden;user-select:none;-webkit-user-select:none;touch-action:pan-y}
.container{max-width:650px;margin:0 auto}
.header{position:relative;display:flex;align-items:center;justify-content:center;padding:16px 0 8px 0;border-bottom:1px solid #333;margin-bottom:16px}
.header-center{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:0}
.header-title{font-size:18px;font-weight:600;color:#fff;letter-spacing:1px;text-transform:uppercase;text-align:center;white-space:nowrap;max-width:100%}
.about-row{display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
.icon-btn{background:#2a2a2a;border:1px solid #3a3a3a;border-radius:6px;width:32px;height:32px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon-btn:hover:not(:disabled){background:#3a3a3a;border-color:#4a4a4a}
.icon-btn:active:not(:disabled){transform:scale(.95)}
.icon-btn:disabled{opacity:.3;cursor:not-allowed}
.lang-btn{position:absolute;left:0;top:16px;background:#2a2a2a;border:1px solid #3a3a3a;border-radius:6px;padding:6px 8px;color:#fff;font-size:clamp(7px,2vw,10px);font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;z-index:10}
.about-btn{background:#2a2a2a;border:1px solid #3a3a3a;border-radius:6px;padding:6px 12px;color:#fff;font-size:clamp(8px,2.5vw,11px);font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;flex-shrink:0}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:#1a1a1a;border:1px solid #333;border-radius:12px;max-width:700px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-header{padding:20px;border-bottom:1px solid #333;display:flex;align-items:center;justify-content:space-between;gap:12px}
.modal-title{font-size:18px;font-weight:600;color:#fff}
.close-btn{background:#2a2a2a;border:1px solid #3a3a3a;border-radius:6px;width:32px;height:32px;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.close-btn:hover{background:#dc2626;border-color:#ef4444}
.modal-content{padding:20px;overflow-y:auto;flex:1;line-height:1.6;color:#ccc;font-size:14px}
.modal-content h1{font-size:22px;color:#fff;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #333}
.modal-content h2{font-size:18px;color:#fff;margin-top:24px;margin-bottom:12px}
.modal-content p{margin-bottom:12px}
.modal-content ul{margin-left:20px;margin-bottom:12px}
.modal-content li{margin-bottom:6px}
.modal-content strong{color:#fff}
.modal-content .warning{background:rgba(251,191,36,.1);padding:12px;border-left:3px solid #fbbf24;border-radius:6px;margin:12px 0}
.panel{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;margin-bottom:12px}
canvas{width:100%;height:200px;background:#0a0a0a;border:1px solid #333;border-radius:6px;cursor:crosshair;display:block;touch-action:none}
.pads{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.pad{aspect-ratio:1;background:#2a2a2a;border:2px solid #3a3a3a;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;position:relative;min-height:0;padding:4px}
.pad:active{transform:scale(.95)}
.pad.active{border-color:#fff;background:#3a3a3a}
.pad.loaded{background:#1a2f1a;border-color:#2d5a2d}
.pad.loaded.active{border-color:#fff;background:#2d4a2d}
.pad.selected{border-color:#d97706;background:#3a2f1a}
.pad.bpm-select1{border-color:#3b82f6!important;background:rgba(59,130,246,.3)!important;animation:bpmPulse 1s infinite}
.pad.bpm-select2{border-color:#8b5cf6!important;background:rgba(139,92,246,.3)!important;animation:bpmPulse 1s infinite}
@keyframes bpmPulse{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.4)}50%{box-shadow:0 0 0 8px rgba(59,130,246,.1)}}
.pad.playing{animation:padPulse .6s infinite}
.pad.locked{opacity:.5;border-style:dashed;border-color:#555;background:#111}
@keyframes padPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.3)}50%{box-shadow:0 0 0 6px rgba(255,255,255,.15)}}
.pad-num{font-size:clamp(12px,4vw,20px);font-weight:600;color:#666;line-height:1}
.pad.loaded .pad-num{color:#fff}
.pad-duration{font-size:clamp(8px,2.5vw,10px);color:#888;margin-top:4px}
.pad.loaded .pad-duration{color:#aaa}
.lock-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(10px,3vw,13px);display:none;pointer-events:none;z-index:2}
.pad.locked .lock-icon{display:block}
.transport{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.transport button{background:#2a2a2a;border:1px solid #3a3a3a;border-radius:6px;padding:16px 4px;color:#fff;cursor:pointer;transition:all .1s;min-height:60px;display:flex;align-items:center;justify-content:center;font-weight:600;white-space:nowrap;line-height:1.1;font-size:clamp(12px,3.5vw,20px)}
.transport button:active{transform:scale(.95);background:#3a3a3a}
.transport button:disabled{opacity:.3;cursor:not-allowed}
.transport button.rec{background:#7f1d1d;border-color:#991b1b}
.transport button.rec.active{background:#dc2626;border-color:#ef4444;animation:recPulse 1s infinite}
@keyframes recPulse{0%,100%{opacity:1}50%{opacity:.85}}
.transport button.play{background:#14532d;border-color:#166534}
.transport button.loop{background:#713f12;border-color:#854d0e}
.transport button.loop.active{background:#ca8a04;border-color:#eab308;color:#000}
.transport button.stop{background:#450a0a;border-color:#7f1d1d}
.btn-xl{font-size:clamp(8.4px,3.12vw,14.4px)!important;font-weight:400!important;text-transform:uppercase}
.btn-sm{font-size:clamp(10.8px,3.15vw,18px)!important;font-weight:400!important;text-transform:uppercase}
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.actions button,.actions label{background:#2a2a2a;border:1px solid #3a3a3a;border-radius:6px;color:#fff;font-weight:400;cursor:pointer;transition:all .1s;min-height:48px;width:100%;display:flex;align-items:center;justify-content:center;text-align:center;white-space:nowrap;line-height:1.1;font-size:clamp(7px,2.6vw,12px);padding:8px 2px;text-transform:uppercase}
.actions button:active,.actions label:active{transform:scale(.95);background:#3a3a3a}
.actions button:disabled{opacity:.3;cursor:not-allowed}
.actions button.merge{background:#713f12;border-color:#854d0e}
.actions button.bpm-sync{background:#2563eb;border-color:#3b82f6;animation:bpmPulse 2s infinite}
.actions button.bpm-sync.active{background:#1d4ed8;box-shadow:0 0 20px rgba(37,99,235,.6)}
.actions button.rec-mix{background:#7f1d1d;border-color:#991b1b}
.actions button.rec-mix.active{background:#dc2626;animation:recPulse 1s infinite}
.actions button.ad-btn{background:#166534;border-color:#15803d}
input[type=file]{display:none}
.status{text-align:center;color:#888;font-size:12px;margin-top:12px;min-height:18px;white-space:normal;word-wrap:break-word}
.effects{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.effect{background:#141414;border-radius:6px;padding:12px;border:1px solid #2a2a2a}
.effect-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:clamp(9px,2.5vw,11px);font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.effect-value{color:#fff;font-size:clamp(11px,3vw,13px);font-weight:600;white-space:nowrap}
.effect input[type=range]{width:100%;height:5px;border-radius:3px;background:#333;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer}
.effect input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;cursor:pointer;border:2px solid #000}
.toggle{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:clamp(9px,2.5vw,11px);color:#888;white-space:nowrap}
.toggle input{width:16px;height:16px;cursor:pointer;accent-color:#fff}
.selection-info{text-align:center;color:#666;font-size:11px;margin-top:8px;min-height:16px}
.mode-indicator{text-align:center;color:#d97706;font-size:11px;margin-bottom:8px;min-height:16px;font-weight:600}
.rec-indicator{display:none;align-items:center;justify-content:center;gap:10px;padding:10px;background:rgba(220,38,38,.1);border:1px solid #7f1d1d;border-radius:6px;margin-top:10px;font-size:12px;color:#f87171;font-weight:600}
.rec-indicator.active{display:flex}
.rec-dot{width:10px;height:10px;border-radius:50%;background:#dc2626;animation:recDotPulse 1s infinite}
@keyframes recDotPulse{0%,100%{opacity:1}50%{opacity:.5}}
.rec-level{flex:1;height:6px;background:#333;border-radius:3px;overflow:hidden}
.rec-level-bar{height:100%;background:linear-gradient(90deg,#22c55e,#eab308,#ef4444);width:0%;transition:width .05s}
.slot-indicator{text-align:center;color:#fff;font-size:13px;font-weight:600;margin-bottom:10px;padding:8px;background:#2a2a2a;border-radius:6px;border:1px solid #3a3a3a;white-space:nowrap}
.context-menu{position:fixed;background:#1a1a1a;border:1px solid #3a3a3a;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.5);z-index:1000;display:none;min-width:150px}
.context-menu.active{display:block}
.context-menu-item{padding:10px 16px;cursor:pointer;font-size:13px;color:#e0e0e0;text-transform:uppercase;font-weight:400}
.context-menu-item:hover{background:#2a2a2a}
.context-menu-item.disabled{opacity:.3;cursor:not-allowed}
.zoom-row{display:flex;justify-content:center;gap:8px;align-items:center;margin-top:8px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">RU</button>
    <div class="header-center">
      <span class="header-title">SAMPLER HENDRIX 5.0</span>
      <div class="about-row">
        <button class="icon-btn" id="undoBtn" onclick="undo()" disabled>←</button>
        <button class="about-btn" onclick="openAbout()"><span data-i18n="about">О ПРОГРАММЕ</span></button>
        <button class="icon-btn" id="redoBtn" onclick="redo()" disabled>→</button>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="aboutModal">
    <div class="modal">
      <div class="modal-header"><div class="modal-title"><span data-i18n="aboutTitle">О SAMPLER HENDRIX 5.0</span></div><button class="close-btn" onclick="closeAbout()">×</button></div>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>
  <div class="panel">
    <div style="display:flex;justify-content:center;margin-bottom:8px;">
      <button id="viewModeBtn" class="icon-btn" style="width:100%;padding:8px;font-size:14px;font-weight:700;text-transform:uppercase;text-align:center;" onclick="toggleViewMode()"><span data-i18n="sample">СЕМПЛ</span></button>
    </div>
    <canvas id="wave"></canvas>
    <div class="zoom-row">
      <button class="icon-btn" onclick="changeZoom(-0.1)">➖</button>
      <span id="zoomVal" style="font-size:12px;color:#888;min-width:50px;text-align:center;">100%</span>
      <button class="icon-btn" onclick="changeZoom(0.1)">➕</button>
    </div>
    <div class="selection-info" id="selInfo"><span data-i18n="tapDrag">Нажмите и перетащите для выбора</span></div>
  </div>
  <div class="panel">
    <div class="mode-indicator" id="modeIndicator"></div>
    <div class="pads" id="pads"></div>
  </div>
  <div class="panel">
    <div class="transport">
      <button id="recBtn" class="rec">●</button>
      <button id="playBtn" class="play" disabled>▶</button>
      <button id="loopBtn" class="loop btn-sm" disabled><span data-i18n="loop">ЦИКЛ</span></button>
      <button id="stopBtn" class="stop" disabled>■</button>
    </div>
    <div class="rec-indicator" id="recIndicator"><div class="rec-dot"></div><span id="recTime">0:00</span><div class="rec-level"><div class="rec-level-bar" id="recLevel"></div></div></div>
    <div class="actions">
      <label for="fileInput" id="loadBtn" class="btn-xl">📂  <span data-i18n="load">Загрузить</span></label>
      <input type="file" id="fileInput" accept="audio/*">
      <button id="trimBtn" class="btn-xl" disabled>✂  <span data-i18n="chop">Обрезать</span></button>
      <button id="resetBtn" class="btn-xl" disabled>↺  <span data-i18n="reset">Сброс</span></button>
      <button id="exportBtn" class="btn-xl" disabled>💾  <span data-i18n="save">Сохранить</span></button>
      <button id="recMixBtn" class="rec-mix btn-xl">⏺  <span data-i18n="recMix">Запись микса</span></button>
      <button id="mergeBtn" class="merge btn-xl" disabled>🔗  <span data-i18n="merge">Объединить</span></button>
      <button id="bpmSyncBtn" class="bpm-sync btn-xl" onclick="toggleBpmSync()">🎵  <span data-i18n="bpmSync">СИНХ BPM</span></button>
      <button id="clearBtn" class="btn-xl" disabled>🗑  <span data-i18n="clear">Очистить</span></button>
      <button id="adBtn" class="ad-btn btn-xl" onclick="unlockNextSlot()">🎁  <span data-i18n="bonus">Бонус</span></button>
    </div>
    <div class="status" id="status"><span data-i18n="loadOrRecord">Загрузите аудио или запишите</span></div>
  </div>
  <div class="panel">
    <div class="slot-indicator" id="slotIndicator"><span data-i18n="slot">Слот</span> 1</div>
    <div class="effects">
      <div class="effect"><div class="effect-label"><span data-i18n="tempo">Темп</span><span class="effect-value" id="tempoVal">1.00x</span></div><input type="range" id="tempo" min="0.25" max="4" step="0.01" value="1"></div>
      <div class="effect"><div class="effect-label"><span data-i18n="pitch">Тон</span><span class="effect-value" id="pitchVal">0 ct</span></div><input type="range" id="pitch" min="-1200" max="1200" step="1" value="0"></div>
      <div class="effect"><div class="effect-label"><span data-i18n="volume">Громкость</span><span class="effect-value" id="volVal">100%</span></div><input type="range" id="vol" min="0" max="1" step="0.01" value="1"></div>
      <div class="effect"><div class="effect-label"><span data-i18n="pan">Панорама</span><span class="effect-value" id="panVal">C</span></div><input type="range" id="pan" min="-1" max="1" step="0.01" value="0"></div>
      <div class="effect"><div class="effect-label"><span data-i18n="filter">Фильтр</span><span class="effect-value" id="filtVal"><span data-i18n="off">Выкл</span></span></div><input type="range" id="filt" min="100" max="16000" step="100" value="1000"><div class="toggle"><input type="checkbox" id="filtOn"><label for="filtOn">LPF</label></div></div>
      <div class="effect"><div class="effect-label"><span data-i18n="distortion">Дисторшн</span><span class="effect-value" id="distVal">0</span></div><input type="range" id="dist" min="0" max="100" step="1" value="0"></div>
      <div class="effect"><div class="effect-label"><span data-i18n="delay">Задержка</span><span class="effect-value" id="delVal">0 ms</span></div><input type="range" id="del" min="0" max="1000" step="10" value="0"></div>
      <div class="effect"><div class="effect-label"><span data-i18n="reverb">Реверб</span><span class="effect-value" id="revVal">0%</span></div><input type="range" id="rev" min="0" max="1" step="0.01" value="0"></div>
      <div class="effect"><div class="effect-label"><span data-i18n="tremolo">Тремоло</span><span class="effect-value" id="tremVal">0%</span></div><input type="range" id="trem" min="0" max="1" step="0.01" value="0"></div>
      <div class="effect"><div class="effect-label"><span data-i18n="invert">Инверт</span><span class="effect-value" id="invertVal"><span data-i18n="off">Выкл</span></span></div><div class="toggle"><input type="checkbox" id="invertOn"><label for="invertOn"><span data-i18n="reverse">Реверс</span></label></div></div>
    </div>
  </div>
</div>
<div class="context-menu" id="contextMenu">
  <div class="context-menu-item" onclick="ctxCopy()" data-i18n="copy">Копировать</div>
  <div class="context-menu-item" onclick="ctxPaste()" data-i18n="paste">Вставить</div>
  <div class="context-menu-item" onclick="ctxDelete()" data-i18n="delete">Удалить</div>
  <div class="context-menu-item" onclick="ctxMove()" data-i18n="move">Двигать</div>
</div>
<script>
let currentLang=localStorage.getItem('samplerLang')||'ru';
let unlockedSlots=[true,true,true,true,true,false,false,false,false,false];
let isAdReady=false;
let viewMode='sample';
let viewZoom=1.0;
let patternClipboard=null;
let selectedPatternSlot=-1;
let isResizing=false,resizeSlotIndex=-1,resizeStartX=0,resizeStartVisualDuration=0;
let initialPinchDistance=0,initialPinchTempo=1;
let volPoints=Array(10).fill(null).map(()=>[{x:0,y:1},{x:0.167,y:1},{x:0.333,y:1},{x:0.5,y:1},{x:0.667,y:1},{x:0.833,y:1},{x:1,y:1}]);
let draggingVolPoint=-1;
let isDraggingPattern=false,dragPatternSlot=-1,dragPatternStartX=0,dragPatternStartOffset=0;
let pendingMoveSlot=-1;
let patternLoopTimer=null;
let patternStartTime=0;
let bpmSyncMode=false;
let bpmSelectFirst=-1;
let previousSampleSlot=0;

// ========== BPM SYNC - ПОЛНОСТЬЮ ПЕРЕПИСАНО ==========
function handlePadClick(i){
  if(!unlockedSlots[i]){unlockNextSlot();return}
  
  // РЕЖИМ BPM СИНХРОНИЗАЦИИ
  if(bpmSyncMode){
    // Проверяем наличие семпла
    if(!slots[i]){
      setStatus(t('bpmNoSample'));
      return;
    }
    
    if(bpmSelectFirst===-1){
      // Первый выбор
      bpmSelectFirst=i;
      const pads=document.querySelectorAll('.pad');
      pads[i].classList.add('bpm-select1');
      setStatus(t('bpmSelect2'));
    } else if(i===bpmSelectFirst){
      // Клик на тот же слот - отмена
      setStatus(t('bpmSameSlot'));
    } else {
      // Второй выбор - синхронизация
      if(!slots[i]){
        setStatus(t('bpmNoSample'));
        return;
      }
      const pads=document.querySelectorAll('.pad');
      pads[i].classList.add('bpm-select2');
      
      // Вычисляем BPM обоих
      setStatus('⏳ Вычисление BPM...');
      
      // Небольшая задержка для UI
      setTimeout(()=>{
        const bpm1=detectBPM(bpmSelectFirst);
        const bpm2=detectBPM(i);
        
        if(bpm1===0||bpm2===0){
          setStatus(t('bpmFailed'));
          resetBpmSync();
          return;
        }
        
        // Применяем синхронизацию
        const ratio=bpm1/bpm2;
        slotSettings[i].tempo*=ratio;
        
        // Ограничиваем tempo в диапазон 0.25-4.0
        slotSettings[i].tempo=Math.max(0.25,Math.min(4.0,slotSettings[i].tempo));
        
        setStatus(`${t('bpmSynced')}: ${bpm2}→${bpm1} BPM (x${ratio.toFixed(2)})`);
        
        // Обновляем UI
        if(i===activeSlot){
          $('tempo').value=slotSettings[i].tempo;
          updateLabelsUI();
        }
        updatePads();
        drawWave();
        saveCurrentSettings();
        
        // Сброс через 2 секунды
        setTimeout(resetBpmSync,2000);
      },100);
    }
    return;
  }
  
  // РЕЖИМ ПЕРЕМЕЩЕНИЯ
  if(pendingMoveSlot>=0&&viewMode==='pattern'){
    if(i!==pendingMoveSlot){performMove(pendingMoveSlot,i)}
    pendingMoveSlot=-1;
    return;
  }
  
  // ОБЫЧНЫЙ РЕЖИМ
  saveCurrentSettings();activeSlot=i;selection=null;selectedPatternSlot=-1;loadSlotSettings(i);updatePads();drawWave();updateTransportButtons();updUndoRedo()
}

function resetBpmSync(){
  bpmSyncMode=false;
  bpmSelectFirst=-1;
  $('bpmSyncBtn').classList.remove('active');
  document.querySelectorAll('.pad').forEach(p=>{
    p.classList.remove('bpm-select1','bpm-select2');
  });
}

function toggleBpmSync(){
  if(bpmSyncMode){
    // Отмена режима
    resetBpmSync();
    setStatus(t('loadOrRecord'));
  } else {
    // Проверка - есть ли хотя бы 2 слота с семплами
    const loadedCount=slots.filter(s=>s!==null).length;
    if(loadedCount<2){
      setStatus('Нужно минимум 2 слота с семплами для синхронизации');
      return;
    }
    bpmSyncMode=true;
    bpmSelectFirst=-1;
    $('bpmSyncBtn').classList.add('active');
    setStatus(t('bpmSelect1'));
  }
}

function detectBPM(slotIndex){
  const buf=slots[slotIndex];
  if(!buf)return 0;
  
  const sampleRate=buf.sampleRate;
  const data=buf.getChannelData(0);
  const length=data.length;
  
  // Downsample до ~4kHz для скорости
  const targetRate=4000;
  const step=Math.max(1,Math.floor(sampleRate/targetRate));
  const downsampled=[];
  for(let i=0;i<length;i+=step){
    downsampled.push(Math.abs(data[i]));
  }
  
  if(downsampled.length<100)return 0;
  
  // Находим максимальную амплитуду
  let maxAmp=0;
  for(let i=0;i<downsampled.length;i++){
    if(downsampled[i]>maxAmp)maxAmp=downsampled[i];
  }
  if(maxAmp<0.01)return 0; // слишком тихо
  
  // Порог для пиков: 35% от максимума
  const threshold=maxAmp*0.35;
  
  // Минимальный зазор между пиками: 200мс при 4kHz = 800 сэмплов
  // Максимальный зазор: 2000мс (30 BPM) = 8000 сэмплов
  const minGap=Math.floor(targetRate*0.2); // 200ms
  const maxGap=Math.floor(targetRate*2.0); // 2000ms
  
  // Поиск пиков
  const peaks=[];
  let lastPeakIdx=-minGap;
  
  for(let i=1;i<downsampled.length-1;i++){
    if(downsampled[i]>threshold&&
       downsampled[i]>=downsampled[i-1]&&
       downsampled[i]>=downsampled[i+1]){
      if(i-lastPeakIdx>=minGap){
        peaks.push(i);
        lastPeakIdx=i;
      }
    }
  }
  
  if(peaks.length<3)return 0; // нужно минимум 3 пика
  
  // Вычисляем интервалы между пиками
  const intervals=[];
  for(let i=1;i<peaks.length;i++){
    const gap=peaks[i]-peaks[i-1];
    if(gap>=minGap&&gap<=maxGap){
      intervals.push(gap);
    }
  }
  
  if(intervals.length<2)return 0;
  
  // Сортируем для медианы
  intervals.sort((a,b)=>a-b);
  const median=intervals[Math.floor(intervals.length/2)];
  
  // Фильтр выбросов: оставляем интервалы в диапазоне 0.5x - 1.5x от медианы
  const filtered=intervals.filter(x=>x>=median*0.5&&x<=median*1.5);
  
  if(filtered.length<2)return 0;
  
  // Средний интервал
  const avgInterval=filtered.reduce((a,b)=>a+b,0)/filtered.length;
  
  // BPM = 60 / (avgInterval / sampleRate_at_4kHz)
  const bpm=60/(avgInterval/targetRate);
  
  // Нормализация в диапазон 60-180 BPM
  let normalized=bpm;
  while(normalized<60&&normalized<360)normalized*=2;
  while(normalized>180&&normalized>30)normalized/=2;
  
  // Если всё ещё вне диапазона — возвращаем 0
  if(normalized<60||normalized>180)return 0;
  
  return Math.round(normalized);
}

function syncBPM(slot1,slot2){
  const bpm1=detectBPM(slot1);
  const bpm2=detectBPM(slot2);
  if(bpm1===0||bpm2===0){
    setStatus(t('bpmFailed'));
    return;
  }
  const ratio=bpm1/bpm2;
  slotSettings[slot2].tempo*=ratio;
  slotSettings[slot2].tempo=Math.max(0.25,Math.min(4.0,slotSettings[slot2].tempo));
  setStatus(`${t('bpmSynced')}: ${bpm2}→${bpm1} BPM`);
  updatePads();drawWave();saveCurrentSettings();
}

function updatePads(){
  document.querySelectorAll('.pad').forEach((p,i)=>{
    p.classList.remove('active','loaded','selected','playing','locked');
    if(!unlockedSlots[i])p.classList.add('locked');
    if(slots[i]){
      p.classList.add('loaded');
      p.querySelector('.pad-duration').textContent=(slots[i].duration/slotSettings[i].tempo).toFixed(1)+'s'
    }else p.querySelector('.pad-duration').textContent='';
    if(i===activeSlot)p.classList.add('active');
    if(activeChains.has(i))p.classList.add('playing')
  })
}

  let hasAudio=false;

  else{hasAudio=slots.some(s=>s!==null)}

}

function ctxCopy(){hideCtx();if(selectedPatternSlot<0||!slots[selectedPatternSlot]){setStatus(t('selectBlockFirst'));return}ensureCtx();patternClipboard={buffer:cloneBuffer(slots[selectedPatternSlot]),settings:{...slotSettings[selectedPatternSlot]},volPoints:volPoints[selectedPatternSlot].map(p=>({...p})),slot:selectedPatternSlot};setStatus(t('copied'))}

function ctxPaste(){
  hideCtx();
  if(!patternClipboard||!patternClipboard.buffer){setStatus(t('nothingToPaste'));return}
  ensureCtx();
  const src=patternClipboard.slot;
  let tgt=-1;
  for(let i=src+1;i<10;i++){if(unlockedSlots[i]&&!slots[i]){tgt=i;break}}
  if(tgt===-1){for(let i=0;i<src;i++){if(unlockedSlots[i]&&!slots[i]){tgt=i;break}}}
  if(tgt===-1){setStatus(t('noFreeSlots'));return}
  pushHistory(tgt);
  slots[tgt]=cloneBuffer(patternClipboard.buffer);
  slotSettings[tgt]={...patternClipboard.settings};
  volPoints[tgt]=patternClipboard.volPoints.map(p=>({...p}));
  activeSlot=tgt;selectedPatternSlot=tgt;
  loadSlotSettings(tgt);updatePads();drawWave();updateTransportButtons();
  setStatus(t('pasted')+' '+(tgt+1));

function startDrag(e){

    const x=getPos(e),y=getYPos(e);const W=canvas.width,H=canvas.height;
    for(let i=0;i<volPoints[activeSlot].length;i++){
      const px=volPoints[activeSlot][i].x*W,py=(1-volPoints[activeSlot][i].y)*H;
      if(Math.abs(x-px)<12&&Math.abs(y-py)<12){draggingVolPoint=i;e.preventDefault();return}
    }

  }
  if(viewMode==='pattern'){
    const x=getPos(e),y=getYPos(e);
    const vis=[];for(let i=0;i<10;i++)if(unlockedSlots[i])vis.push(i);
    const lh=canvas.height/vis.length;const li=Math.floor(y/lh);
    if(li>=0&&li<vis.length){
      const si=vis[li];

        const bw=Math.max(20,vd*pps);
        const bx=16+slotSettings[si].offset*pps;
        if(x>=bx+bw-15&&x<=bx+bw+15){isResizing=true;resizeSlotIndex=si;resizeStartX=x;resizeStartVisualDuration=vd;e.preventDefault();return}
        if(x>=bx&&x<=bx+bw){

function moveDrag(e){

    volPoints[activeSlot][draggingVolPoint].y=Math.max(0,Math.min(1,1-y/H));

    slotSettings[activeSlot].vol=avg;$('vol').value=avg;updateLabelsUI();drawWave();return;

    e.preventDefault();const x=getPos(e);const dx=x-resizeStartX;const pps=50*viewZoom;

    const vis=[];for(let i=0;i<10;i++)if(unlockedSlots[i])vis.push(i);
    const lh=canvas.height/vis.length;const li=Math.floor(y/lh);
    if(li>=0&&li<vis.length){
      const targetSlot=vis[li];

        let newOffset=dragPatternStartOffset+(dx/pps);

      } else if(targetSlot!==dragPatternSlot){
        if(slots[targetSlot]){
          const tmpBuf=slots[targetSlot];const tmpSet={...slotSettings[targetSlot]};const tmpVol=volPoints[targetSlot].map(p=>({...p}));
          slots[targetSlot]=slots[dragPatternSlot];slotSettings[targetSlot]={...slotSettings[dragPatternSlot]};volPoints[targetSlot]=volPoints[dragPatternSlot].map(p=>({...p}));
          slots[dragPatternSlot]=tmpBuf;slotSettings[dragPatternSlot]=tmpSet;volPoints[dragPatternSlot]=tmpVol;
        } else {
          slots[targetSlot]=slots[dragPatternSlot];slotSettings[targetSlot]={...slotSettings[dragPatternSlot]};volPoints[targetSlot]=volPoints[dragPatternSlot].map(p=>({...p}));
          slots[dragPatternSlot]=null;slotSettings[dragPatternSlot]={tempo:1,pitch:0,vol:1,pan:0,filt:1000,filtOn:false,dist:0,del:0,rev:0,trem:0,invert:false,offset:0};volPoints[dragPatternSlot]=[{x:0,y:1},{x:0.167,y:1},{x:0.333,y:1},{x:0.5,y:1},{x:0.667,y:1},{x:0.833,y:1},{x:1,y:1}];

function endDrag(){

function drawWave(){
  const W=canvas.width,H=canvas.height;if(!W||!H)return;
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,W,H);
  if(viewMode==='sample'){
    const buf=slots[activeSlot];if(!buf)return;
    const data=buf.getChannelData(0);const totalSamples=data.length;const visibleSamples=Math.floor(totalSamples/viewZoom);const step=Math.max(1,Math.ceil(visibleSamples/W));const amp=H/2;const duration=buf.duration/viewZoom;
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
    const secInterval=duration>10?2:duration>5?1:0.5;
    for(let s=0;s<=duration;s+=secInterval){const x=(s/duration)*W;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='9px sans-serif';ctx.fillText(s.toFixed(1)+'s',x+2,H-4)}
    if(selection&&selection.end-selection.start>1){ctx.fillStyle='rgba(0,255,0,0.15)';ctx.fillRect(selection.start,0,selection.end-selection.start,H);ctx.strokeStyle='#0f0';ctx.lineWidth=1;ctx.strokeRect(selection.start,0,selection.end-selection.start,H)}
    ctx.strokeStyle='#ffffff';ctx.lineWidth=1.2;ctx.beginPath();
    for(let i=0;i<W;i++){let mn=1,mx=-1;const base=i*step;for(let j=0;j<step;j++){const v=data[base+j]||0;if(v<mn)mn=v;if(v>mx)mx=v}if(i===0)ctx.moveTo(i,(1+mn)*amp);ctx.lineTo(i,(1+mn)*amp);ctx.lineTo(i,(1+mx)*amp)}
    ctx.stroke();
    ctx.strokeStyle='rgba(74,222,128,0.9)';ctx.lineWidth=2;ctx.beginPath();
    for(let i=0;i<volPoints[activeSlot].length;i++){const px=volPoints[activeSlot][i].x*W,py=(1-volPoints[activeSlot][i].y)*H;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)}
    ctx.stroke();
    for(let i=0;i<volPoints[activeSlot].length;i++){const px=volPoints[activeSlot][i].x*W,py=(1-volPoints[activeSlot][i].y)*H;ctx.fillStyle=i===draggingVolPoint?'#fff':'#4ade80';ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=1;ctx.stroke()}
    drawPlayhead();
  } else {
    const vis=[];for(let i=0;i<10;i++)if(unlockedSlots[i])vis.push(i);
    const lh=H/vis.length;const pps=50*viewZoom;
    const totalDuration=Math.max(...vis.map(i=>slots[i]?((slots[i].duration/slotSettings[i].tempo)+Math.max(0,slotSettings[i].offset)):0),10);
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
    const secInterval=totalDuration>20?5:totalDuration>10?2:1;
    for(let s=0;s<=totalDuration;s+=secInterval){const x=16+s*pps;if(x>W)break;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='9px sans-serif';ctx.fillText(s+'s',x+2,H-4)}
    for(let i=0;i<vis.length;i++){
      const si=vis[i],y=i*lh;
      ctx.fillStyle=(si===activeSlot)?'#1a2f1a':'#141414';ctx.fillRect(0,y,W,lh);
      ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
      ctx.fillStyle='#666';ctx.font='10px sans-serif';ctx.fillText((si+1)+'',4,y+14);
      if(slots[si]){
        const vd=slots[si].duration/slotSettings[si].tempo;const bw=Math.max(20,vd*pps);
        const bx=16+Math.max(0,slotSettings[si].offset)*pps;
        const colors=['#2d5a2d','#166534','#14532d','#713f12','#7f1d1d','#450a0a','#3a3a3a','#2a2a2a','#1a1a1a','#0f0f0f'];

        if(si===selectedPatternSlot){ctx.strokeStyle='#d97706';ctx.lineWidth=3;ctx.strokeRect(bx,y+4,bw,lh-8)}
        const data=slots[si].getChannelData(0);const st=Math.max(1,Math.ceil(data.length/bw));const wa=(lh-8)/2;const cy2=y+4+wa;
        ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1;ctx.beginPath();
        for(let px=0;px<bw;px++){let mn=1,mx=-1;const ds=Math.floor((px/bw)*data.length);for(let j=ds;j<Math.min(data.length,ds+st);j++){const v=data[j]||0;if(v<mn)mn=v;if(v>mx)mx=v}if(px===0)ctx.moveTo(bx+px,cy2+mn*wa);ctx.lineTo(bx+px,cy2+mn*wa);ctx.lineTo(bx+px,cy2+mx*wa)}
        ctx.stroke();
        ctx.strokeStyle='rgba(74,222,128,0.5)';ctx.lineWidth=1;ctx.beginPath();
        for(let p=0;p<volPoints[si].length;p++){const px=bx+volPoints[si][p].x*bw,py=y+4+(1-volPoints[si][p].y)*(lh-8);if(p===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)}
        ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillRect(bx+bw-4,y+4,4,lh-8);
        ctx.fillStyle='#fff';ctx.font='9px sans-serif';ctx.fillText(vd.toFixed(1)+'s',bx+4,y+lh-6);
      }
    }
    if(patternStartTime>0){
      const elapsed=audioCtx.currentTime-patternStartTime;
      const cursorX=16+elapsed*pps;
      if(cursorX>=0&&cursorX<=W){
        ctx.strokeStyle='rgba(220,38,38,0.25)';ctx.lineWidth=8;
        ctx.beginPath();ctx.moveTo(cursorX,0);ctx.lineTo(cursorX,H);ctx.stroke();
        ctx.strokeStyle='#dc2626';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(cursorX,0);ctx.lineTo(cursorX,H);ctx.stroke();
        ctx.fillStyle='#dc2626';ctx.beginPath();ctx.moveTo(cursorX-6,0);ctx.lineTo(cursorX+6,0);ctx.lineTo(cursorX,10);ctx.closePath();ctx.fill();
      }
    }
  }
}
function drawPlayhead(){if(!canvas.width)return;const H=canvas.height;activeChains.forEach((d,si)=>{const pos=getCurPos(d.chain);const vd=d.chain.bufferDuration/d.chain.playbackRate;const x=(pos/vd)*canvas.width;ctx.strokeStyle=si===activeSlot?'#dc2626':'rgba(255,255,255,0.3)';ctx.lineWidth=si===activeSlot?2:1;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()})}
function getCurPos(c){if(!audioCtx)return 0;const el=audioCtx.currentTime-c.startTime;let p=c.offset+el*c.playbackRate;if(c.loop){const ll=c.loopEnd-c.loopStart;if(ll>0&&p>=c.loopEnd)p=c.loopStart+((p-c.loopStart)%ll)}else if(p>c.bufferDuration)p=c.bufferDuration;return Math.max(0,Math.min(c.bufferDuration,p))}
function renderLoop(){drawWave();if(activeChains.size>0)rafId=requestAnimationFrame(renderLoop);else rafId=null}
function startRenderLoop(){if(!rafId)rafId=requestAnimationFrame(renderLoop)}
function stopRenderLoop(){if(rafId){cancelAnimationFrame(rafId);rafId=null}drawWave()}

function createChain(ac,buf,opts,si){
  const src=ac.createBufferSource();src.buffer=buf;src.loop=opts.loop;src.playbackRate.value=opts.playbackRate;src.detune.value=opts.detune;
  if(opts.loop){src.loopStart=opts.loopStart;src.loopEnd=opts.loopEnd}
  const flt=ac.createBiquadFilter();flt.type='lowpass';flt.frequency.value=opts.filtOn?opts.filt:20000;
  const sh=ac.createWaveShaper();sh.curve=mkDist(opts.dist);sh.oversample='4x';
  const dly=ac.createDelay(2);dly.delayTime.value=Math.max(.001,opts.del/1000);
  const dfb=ac.createGain();dfb.gain.value=.4;const dw=ac.createGain();dw.gain.value=opts.del>0?.5:0;
  const cv=ac.createConvolver();cv.buffer=mkImp(ac,2,2);
  const rw=ac.createGain();rw.gain.value=opts.rev;const rd=ac.createGain();rd.gain.value=1-opts.rev*.5;
  const tg=ac.createGain();tg.gain.value=1;
  const tl=ac.createOscillator();tl.frequency.value=6;tl.type='sine';
  const td=ac.createGain();td.gain.value=opts.trem*.5;
  tl.connect(td);td.connect(tg.gain);tl.start();
  const pn=ac.createStereoPanner();pn.pan.value=opts.pan;
  const og=ac.createGain();og.gain.value=opts.vol;
  src.connect(flt);flt.connect(sh);sh.connect(dly);dly.connect(dfb);dfb.connect(dly);dly.connect(dw);
  const ad=ac.createGain();sh.connect(ad);dw.connect(ad);ad.connect(cv);cv.connect(rw);ad.connect(rd);
  const ar=ac.createGain();rw.connect(ar);rd.connect(ar);ar.connect(tg);tg.connect(pn);pn.connect(og);og.connect(ac.destination);
  if(isRecordingMix&&mixStreamDest)og.connect(mixStreamDest);
  const now=ac.currentTime;
  const vp=volPoints[si];
  og.gain.setValueAtTime(vp[0].y*opts.vol,now);
  for(let i=1;i<vp.length;i++){const time=now+vp[i].x*buf.duration/opts.playbackRate;og.gain.linearRampToValueAtTime(vp[i].y*opts.vol,time)}
  const startTime=opts.startAt!==undefined?opts.startAt:now;
  if(opts.loop){src.start(startTime,opts.offset||0)}
  else if(opts.offset>0||opts.duration){src.start(startTime,opts.offset,opts.duration)}
  else{src.start(startTime)}
  return{source:src,filter:flt,shaper:sh,delay:dly,delayFb:dfb,delayWet:dw,convolver:cv,revWet:rw,revDry:rd,tremoloGain:tg,tremoloLfo:tl,tremoloDepth:td,panner:pn,outputGain:og,slotIndex:si,startTime:startTime,offset:opts.offset||0,bufferDuration:buf.duration,playbackRate:opts.playbackRate,loop:opts.loop,loopStart:opts.loopStart||0,loopEnd:opts.loopEnd||buf.duration}
}
function updateAllChains(){activeChains.forEach((d,si)=>{const c=d.chain,s=slotSettings[si];c.source.playbackRate.value=s.tempo;c.source.detune.value=s.pitch;c.playbackRate=s.tempo;c.filter.frequency.value=s.filtOn?s.filt:20000;c.shaper.curve=mkDist(s.dist);c.delay.delayTime.value=Math.max(.001,s.del/1000);c.delayWet.gain.value=s.del>0?.5:0;c.revWet.gain.value=s.rev;c.revDry.gain.value=1-s.rev*.5;c.tremoloDepth.gain.value=s.trem*.5;c.panner.pan.value=s.pan;c.outputGain.gain.value=s.vol})}

function play(loop){
  stopAll();
  if(viewMode==='sample'){
    const buf=slots[activeSlot];if(!buf)return;
    const id=++currentSourceId;const s=slotSettings[activeSlot];
    const opts={loop,playbackRate:s.tempo,detune:s.pitch,vol:s.vol,pan:s.pan,filtOn:s.filtOn,filt:s.filt,dist:s.dist,del:s.del,rev:s.rev,trem:s.trem,offset:0,duration:buf.duration,loopStart:0,loopEnd:buf.duration};
    if(selection&&selection.end-selection.start>2){
      const d=buf.duration;const o=selection.start/canvas.width*d;const l=(selection.end-selection.start)/canvas.width*d;
      if(loop){opts.offset=o;opts.loopStart=o;opts.loopEnd=o+l}else{opts.offset=o;opts.duration=Math.min(l,d-o)}
    }
    const ch=createChain(audioCtx,buf,opts,activeSlot);
    activeChains.set(activeSlot,{chain:ch,id});
    updatePads();startRenderLoop();
    ch.source.onended=()=>{
      const d=activeChains.get(activeSlot);
      if(d&&d.id===id){try{ch.tremoloLfo.stop()}catch(e){}activeChains.delete(activeSlot);updatePads();if(!activeChains.size){stopRenderLoop();if(isLooping){isLooping=false;$('loopBtn').classList.remove('active')}}}
    };
  } else {
    let maxEndTime=0;
    const now=audioCtx.currentTime;
    patternStartTime=now;
    for(let i=0;i<10;i++){
      if(!slots[i]||!unlockedSlots[i])continue;
      const buf=slots[i];const s=slotSettings[i];
      const vd=buf.duration/s.tempo;
      const offset=Math.max(0,s.offset);
      const endTime=offset+vd;
      if(endTime>maxEndTime)maxEndTime=endTime;
      const id=++currentSourceId;
      const opts={loop:false,playbackRate:s.tempo,detune:s.pitch,vol:s.vol,pan:s.pan,filtOn:s.filtOn,filt:s.filt,dist:s.dist,del:s.del,rev:s.rev,trem:s.trem,offset:0,duration:buf.duration,loopStart:0,loopEnd:buf.duration,startAt:now+offset};
      const ch=createChain(audioCtx,buf,opts,i);
      activeChains.set(i,{chain:ch,id});
    }
    updatePads();startRenderLoop();
    if(loop&&maxEndTime>0){
      const loopDuration=maxEndTime*1000;
      patternLoopTimer=setTimeout(()=>{if(isLooping){play(true)}},loopDuration);
    }
  }
}

function stopSlot(i){const d=activeChains.get(i);if(d){try{d.chain.source.stop()}catch(e){}try{d.chain.tremoloLfo.stop()}catch(e){}activeChains.delete(i)}updatePads();if(!activeChains.size)stopRenderLoop()}
function stopAll(){
  if(patternLoopTimer){clearTimeout(patternLoopTimer);patternLoopTimer=null}
  activeChains.forEach(d=>{try{d.chain.source.stop()}catch(e){}try{d.chain.tremoloLfo.stop()}catch(e){}});
  activeChains.clear();updatePads();stopRenderLoop();isLooping=false;$('loopBtn').classList.remove('active');patternStartTime=0;
}
$('playBtn').onclick=()=>{if(isLooping){isLooping=false;$('loopBtn').classList.remove('active');stopAll()}else{play(false)}};
$('loopBtn').onclick=()=>{if(isLooping){isLooping=false;$('loopBtn').classList.remove('active');stopAll()}else{isLooping=true;$('loopBtn').classList.add('active');play(true)}};
$('stopBtn').onclick=stopAll;

$('fileInput').onchange=async e=>{const f=e.target.files[0];if(!f)return;ensureCtx();setStatus(t('loading'));try{pushHistory(activeSlot);slots[activeSlot]=await audioCtx.decodeAudioData(await f.arrayBuffer());selection=null;drawWave();updatePads();updateTransportButtons();setStatus(t('loadedToSlot')+' '+(activeSlot+1))}catch(er){setStatus(t('errorLoading'))}};
$('recBtn').addEventListener('click',async function(){try{if(isRecording){if(recTimerInterval)clearInterval(recTimerInterval);if(recMediaRecorder&&recMediaRecorder.state!=='inactive')recMediaRecorder.stop();return}ensureCtx();const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});recStream=stream;recChunks=[];recMediaRecorder=new MediaRecorder(stream);recMediaRecorder.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data)};recMediaRecorder.onstop=async()=>{if(recStream){recStream.getTracks().forEach(t=>t.stop());recStream=null}if(!recChunks.length){setStatus(t('noAudioRecorded'));resetRecUI();return}try{const buf=await audioCtx.decodeAudioData(await new Blob(recChunks,{type:recMediaRecorder.mimeType}).arrayBuffer());pushHistory(activeSlot);slots[activeSlot]=buf;selection=null;drawWave();updatePads();updateTransportButtons();setStatus(t('recorded')+' '+buf.duration.toFixed(1)+'s')}catch(e){setStatus(t('errorProcessing'))}resetRecUI()};recMediaRecorder.start();isRecording=true;recStartTime=Date.now();$('recBtn').classList.add('active');$('recBtn').textContent='■';$('recIndicator').classList.add('active');recTimerInterval=setInterval(()=>{const s=Math.floor((Date.now()-recStartTime)/1000);$('recTime').textContent=Math.floor(s/60)+':'+(s%60+'').padStart(2,'0')},100)}catch(e){setStatus(e.name==='NotAllowedError'?t('micPermissionDenied'):t('micError'));resetRecUI()}});
function resetRecUI(){isRecording=false;$('recBtn').classList.remove('active');$('recBtn').textContent='●';$('recIndicator').classList.remove('active')}

$('recMixBtn').onclick=async()=>{ensureCtx();await audioCtx.resume();if(!isRecordingMix){mixStreamDest=audioCtx.createMediaStreamDestination();mixChunks=[];activeChains.forEach(d=>d.chain.outputGain.connect(mixStreamDest));let mt='';if(MediaRecorder.isTypeSupported('audio/webm;codecs=opus'))mt='audio/webm;codecs=opus';else if(MediaRecorder.isTypeSupported('audio/webm'))mt='audio/webm';mixRecorder=new MediaRecorder(mixStreamDest.stream,mt?{mimeType:mt}:undefined);mixRecorder.ondataavailable=e=>{if(e.data.size>0)mixChunks.push(e.data)};mixRecorder.start(100);isRecordingMix=true;mixStartTime=Date.now();$('recMixBtn').classList.add('active');$('recMixBtn').textContent='■ '+t('save');setStatus(t('recordingMix'))}else{if(mixTimerInterval)clearInterval(mixTimerInterval);activeChains.forEach(d=>{try{d.chain.outputGain.disconnect(mixStreamDest)}catch(e){}});mixRecorder.onstop=async()=>{if(!mixChunks.length){setStatus(t('noAudioRecorded'));resetMixUI();return}try{const blob=new Blob(mixChunks,{type:mixRecorder.mimeType||'audio/webm'});await saveFileToDevice(blob,'smplrbot_mix.webm')}catch(e){setStatus(t('errorExport'))}resetMixUI()};try{mixRecorder.stop()}catch(e){resetMixUI()}}};
function resetMixUI(){isRecordingMix=false;$('recMixBtn').classList.remove('active');$('recMixBtn').textContent='⏺  '+t('recMix');mixChunks=[];mixStreamDest=null;mixRecorder=null}

async function saveFileToDevice(blob,filename){setStatus(t('processing'));try{if(navigator.share&&navigator.canShare){const file=new File([blob],filename,{type:blob.type});if(navigator.canShare({files:[file]})){await navigator.share({files:[file]});setStatus(t('exported'));return}}const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);setStatus(t('exported'))}catch(e){setStatus(t('errorExport'))}}

async function convertToMP3(ab){const sr=ab.sampleRate,nc=ab.numberOfChannels,len=ab.length;const enc=new lamejs.Mp3Encoder(nc,sr,128);const l=f32i16(ab.getChannelData(0));const r=nc>1?f32i16(ab.getChannelData(1)):l;const d=[];for(let i=0;i<len;i+=1152){const b=enc.encodeBuffer(l.subarray(i,i+1152),r.subarray(i,i+1152));if(b.length)d.push(b)}const e=enc.flush();if(e.length)d.push(e);return new Blob(d,{type:'audio/mp3'})}
function f32i16(f){const i=new Int16Array(f.length);for(let x=0;x<f.length;x++){const s=Math.max(-1,Math.min(1,f[x]));i[x]=s<0?s*0x8000:s*0x7FFF}return i}
function mkDist(a){const k=a,n=44100,c=new Float32Array(n),d=Math.PI/180;for(let i=0;i<n;i++){const x=i*2/n-1;c[i]=(3+k)*x*20*d/(Math.PI+k*Math.abs(x))}return c}
function mkImp(ac,dur,dec){const r=ac.sampleRate,l=Math.max(1,Math.floor(r*dur));const i=ac.createBuffer(2,l,r);for(let c=0;c<2;c++){const ch=i.getChannelData(c);for(let x=0;x<l;x++)ch[x]=(Math.random()*2-1)*Math.pow(1-x/l,dec)}return i}

$('trimBtn').onclick=()=>{const b=slots[activeSlot];if(!b||!selection||selection.end-selection.start<2){setStatus(t('selectSliceFirst'));return}const s=Math.floor(selection.start/canvas.width*b.length),e=Math.floor(selection.end/canvas.width*b.length);const nl=Math.max(1,e-s);pushHistory(activeSlot);const nb=audioCtx.createBuffer(b.numberOfChannels,nl,b.sampleRate);for(let c=0;c<b.numberOfChannels;c++){const src=b.getChannelData(c),dst=nb.getChannelData(c);for(let i=0;i<nl;i++)dst[i]=src[s+i]||0}slots[activeSlot]=nb;selection=null;drawWave();updatePads();setStatus(t('chopped'))};
$('resetBtn').onclick=$('clearBtn').onclick=()=>{if(slots[activeSlot])pushHistory(activeSlot);stopSlot(activeSlot);slots[activeSlot]=null;selection=null;drawWave();updatePads();updateTransportButtons();setStatus(t('slotCleared'))};
$('mergeBtn').onclick=()=>{if(selectedSlots.size<2)return;const idx=[...selectedSlots].sort((a,b)=>a-b);const bufs=idx.map(i=>slots[i]).filter(b=>b);if(bufs.length<2){setStatus(t('notEnoughSlots'));return}let ts=slots.findIndex(s=>s===null);if(ts<0){setStatus(t('noFreeSlots'));return}const sr=bufs[0].sampleRate,nc=bufs[0].numberOfChannels,tl=bufs.reduce((s,b)=>s+b.length,0);const m=audioCtx.createBuffer(nc,tl,sr);let off=0;for(const b of bufs){for(let c=0;c<nc;c++)m.getChannelData(c).set(b.getChannelData(c),off);off+=b.length}slots[ts]=m;activeSlot=ts;selectMode=false;selectedSlots.clear();$('selectModeBtn').innerHTML='✓  '+t('select');$('modeIndicator').textContent='';drawWave();updatePads();updateTransportButtons();setStatus(t('merged'))};
$('exportBtn').onclick=async()=>{const vs=slots.filter(s=>s);if(!vs.length){setStatus(t('noValidSlots'));return}setStatus(t('processing'));try{const sr=vs[0].sampleRate,nc=vs[0].numberOfChannels;const tl=vs.reduce((s,b)=>s+b.length,0);const oc=new OfflineAudioContext(nc,tl,sr);let ct=0;for(let i=0;i<10;i++){if(slots[i]&&unlockedSlots[i]){const src=oc.createBufferSource();src.buffer=slots[i];src.playbackRate.value=slotSettings[i].tempo;src.connect(oc.destination);src.start(ct);ct+=slots[i].duration/slotSettings[i].tempo}}const r=await oc.startRendering();const mp3=await convertToMP3(r);await saveFileToDevice(mp3,'smplrbot_export.mp3')}catch(e){setStatus(t('errorExport'))}};

function updateLabelsUI(){$('tempoVal').textContent=(+$('tempo').value).toFixed(2)+'x';$('pitchVal').textContent=$('pitch').value+' ct';$('volVal').textContent=Math.round($('vol').value*100)+'%';const p=+$('pan').value;$('panVal').textContent=Math.abs(p)<.02?'C':p<0?'L'+Math.round(-p*100):'R'+Math.round(p*100);$('revVal').textContent=Math.round($('rev').value*100)+'%';$('delVal').textContent=$('del').value+' ms';$('distVal').textContent=$('dist').value;$('filtVal').innerHTML=$('filtOn').checked?$('filt').value+' Hz':t('off');$('tremVal').textContent=Math.round($('trem').value*100)+'%';$('invertVal').innerHTML=$('invertOn').checked?t('on'):t('off')}
function updateLabels(){updateLabelsUI();saveCurrentSettings();updateAllChains()}
['tempo','pitch','vol','pan','rev','del','dist','filt','trem'].forEach(id=>$(id).addEventListener('input',updateLabels));
$('filtOn').addEventListener('change',updateLabels);
$('invertOn').addEventListener('change',e=>{const b=slots[activeSlot];if(!b){e.target.checked=false;return}pushHistory(activeSlot);for(let c=0;c<b.numberOfChannels;c++)b.getChannelData(c).reverse();slotSettings[activeSlot].invert=e.target.checked;updateLabelsUI();setStatus(e.target.checked?t('sampleReversed'):t('sampleRestored'))});
function setStatus(msg){$('status').textContent=msg}

function openAbout(){$('aboutModal').classList.add('active');document.body.style.overflow='hidden'}
function closeAbout(){$('aboutModal').classList.remove('active');document.body.style.overflow=''}
$('aboutModal').addEventListener('click',e=>{if(e.target.id==='aboutModal')closeAbout()});

function checkAdReadiness(){if(!window.vkBridge)return;window.vkBridge.send('VKWebAppCheckNativeAds',{ad_format:'reward'}).then(d=>{isAdReady=d.result}).catch(()=>{isAdReady=false})}
function unlockNextSlot(){if(!window.vkBridge)return;const i=unlockedSlots.findIndex(u=>!u);if(i<0){setStatus(t('allUnlocked'));return}if(!isAdReady){setStatus(t('adLoadingWait'));checkAdReadiness();return}window.vkBridge.send('VKWebAppShowNativeAds',{ad_format:'reward'}).then(d=>{if(d.result){unlockedSlots[i]=true;updatePads();drawWave();setStatus(t('slotUnlocked')+' '+(i+1));setTimeout(checkAdReadiness,2000)}else setStatus(t('adUnavailable'))}).catch(()=>setStatus(t('adUnavailable')))}
if(window.vkBridge){window.vkBridge.send('VKWebAppInit').then(()=>{checkAdReadiness();setInterval(checkAdReadiness,30000)})}

init();
</script>
